spring.application.name=gitBlog

# Server
server.port=8080

# DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/blog_db?useSSL=false&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.example.blog.dto
mybatis.configuration.map-underscore-to-camel-case=true

# Logging
logging.level.com.example.blog=DEBUG
